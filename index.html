<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dom's WC26 Trip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS (family tracker palette) ── */
:root {
  --navy:       #012169;
  --navy-deep:  #011040;
  --navy-mid:   #02308a;
  --navy-light: rgba(1,33,105,0.12);
  --cream:      #FDE9C8;
  --cream-soft: #FFF5E6;
  --red:        #CF2B37;
  --red-light:  rgba(207,43,55,0.12);
  --gold:       #F59E0B;
  --gold-light: rgba(245,158,11,0.15);
  --white:      #FFFFFF;
  --text:       #012169;
  --text-sec:   rgba(1,33,105,0.65);
  --text-muted: rgba(1,33,105,0.4);
  --border:     rgba(1,33,105,0.12);
  --card:       #FFFFFF;
  --bg:         #EEF2FF;
  --confirmed:  #15803d;
  --option:     #B45309;
  --mono:       'JetBrains Mono', monospace;
  --display:    'Bebas Neue', sans-serif;
  --body:       'Inter', sans-serif;
  --safe-b:     env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: var(--body);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ── STICKY NAV ── */
.top-nav {
  position: sticky; top: 0; z-index: 200;
  background: var(--navy);
  padding: 0 16px;
  height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 12px rgba(1,33,105,0.25);
}

.nav-brand { display: flex; align-items: center; gap: 10px; }

.nav-flag { font-size: 22px; line-height: 1; }

.nav-title {
  font-family: var(--display);
  font-size: 22px;
  color: var(--cream);
  letter-spacing: 0.5px;
  line-height: 1;
}

.nav-sub {
  font-size: 10px;
  color: rgba(253,233,200,0.55);
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  line-height: 1;
  margin-top: 1px;
}

.route-toggle {
  display: flex;
  background: rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 2px;
  gap: 2px;
}

.route-btn {
  font-family: var(--body);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 5px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.18s;
}

.route-btn.active {
  background: var(--cream);
  color: var(--navy);
}
.route-btn:not(.active) {
  background: transparent;
  color: rgba(253,233,200,0.55);
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 200;
  background: var(--navy);
  display: flex;
  padding-bottom: var(--safe-b);
  border-top: 1px solid rgba(255,255,255,0.1);
}

.bnav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 10px 0;
  background: none;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}

.bnav-btn.active { color: var(--cream); }
.bnav-btn:not(.active) { color: rgba(253,233,200,0.4); }

.bnav-btn.active::after {
  content: '';
  position: absolute;
  top: 0; left: 25%; right: 25%;
  height: 2px;
  background: var(--cream);
  border-radius: 0 0 2px 2px;
}

.bnav-icon { font-size: 19px; line-height: 1; }
.bnav-label { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }

/* ── CONTENT PAGES ── */
.page { display: none; padding-bottom: calc(68px + var(--safe-b)); }
.page.active { display: block; }

/* ── LOADING STATE ── */
.loading-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  gap: 12px;
}

.loading-spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--navy);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
}

/* ── SECTION LABELS ── */
.section-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 18px 16px 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── CARDS ── */
.card {
  background: var(--card);
  border-radius: 14px;
  margin: 0 16px 10px;
  border: 1px solid var(--border);
  overflow: hidden;
}

.card-pad { padding: 14px 16px; }

/* ── TODAY HERO ── */
.today-hero {
  background: var(--navy);
  padding: 20px 16px 18px;
  position: relative;
  overflow: hidden;
}

.today-hero::before {
  content: '';
  position: absolute;
  right: -30px; top: -30px;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: rgba(253,233,200,0.04);
  border: 1px solid rgba(253,233,200,0.08);
}

.today-hero::after {
  content: '';
  position: absolute;
  right: 20px; top: 20px;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: rgba(253,233,200,0.04);
  border: 1px solid rgba(253,233,200,0.08);
}

.hero-eyebrow {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(253,233,200,0.55);
  margin-bottom: 4px;
}

.hero-city {
  font-family: var(--display);
  font-size: 58px;
  letter-spacing: 1px;
  line-height: 1;
  color: var(--cream);
  position: relative; z-index: 1;
}

.hero-date {
  font-size: 12px;
  font-weight: 500;
  color: rgba(253,233,200,0.55);
  margin-top: 4px;
}

.hero-pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 12px;
  position: relative; z-index: 1;
}

.hero-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  border: 1px solid rgba(253,233,200,0.2);
  background: rgba(253,233,200,0.08);
  color: var(--cream);
}

.hero-pill.match-pill {
  background: var(--red);
  border-color: transparent;
}

/* ── DAY SCROLLER ── */
.day-scroll-wrap {
  background: var(--navy);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.day-scroll {
  display: flex;
  gap: 6px;
  padding: 10px 16px 12px;
  overflow-x: auto;
  scrollbar-width: none;
}
.day-scroll::-webkit-scrollbar { display: none; }

.day-chip {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 7px 9px;
  border-radius: 10px;
  border: 1px solid rgba(253,233,200,0.15);
  cursor: pointer;
  background: transparent;
  min-width: 44px;
  transition: all 0.15s;
  color: rgba(253,233,200,0.55);
}

.day-chip:hover { border-color: rgba(253,233,200,0.4); color: var(--cream); }
.day-chip.selected { background: var(--cream); border-color: var(--cream); color: var(--navy); }
.day-chip.match-day { border-color: rgba(207,43,55,0.6); }
.day-chip.match-day:not(.selected) { color: rgba(253,233,200,0.75); }

.chip-day {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  line-height: 1;
}

.chip-date {
  font-family: var(--display);
  font-size: 22px;
  letter-spacing: 0.5px;
  line-height: 1;
}

.chip-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--red);
  opacity: 0;
}
.day-chip.match-day .chip-dot { opacity: 1; }
.day-chip.selected .chip-dot { background: var(--navy); opacity: 1; }

/* ── MATCHDAY BANNER ── */
.match-banner {
  margin: 12px 16px 0;
  background: var(--red);
  border-radius: 14px;
  padding: 14px 16px;
  position: relative;
  overflow: hidden;
}
.match-banner::before {
  content: '⚽';
  position: absolute;
  right: -10px; top: -12px;
  font-size: 80px;
  opacity: 0.1;
  transform: rotate(12deg);
}
.match-label {
  font-family: var(--mono);
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.65);
  margin-bottom: 4px;
}
.match-title {
  font-family: var(--display);
  font-size: 28px;
  color: #fff;
  letter-spacing: 0.5px;
  line-height: 1.1;
}
.match-chips {
  display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px;
}
.match-chip {
  background: rgba(0,0,0,0.2);
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 11px; font-weight: 600;
  color: rgba(255,255,255,0.9);
}

/* ── ALERT ── */
.alert {
  margin: 10px 16px 0;
  background: var(--gold-light);
  border: 1px solid rgba(245,158,11,0.3);
  border-radius: 12px;
  padding: 10px 12px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.alert-icon { font-size: 16px; flex-shrink: 0; line-height: 1.4; }
.alert-body { flex: 1; }
.alert-title { font-size: 12px; font-weight: 700; color: #92400e; }
.alert-text { font-size: 11px; color: #78350f; margin-top: 1px; line-height: 1.4; }

/* ── TIMELINE ── */
.timeline { padding: 0 16px; }
.tl-row {
  display: grid;
  grid-template-columns: 52px 1fr;
  gap: 0 10px;
  position: relative;
}
.tl-row:not(:last-child)::after {
  content: '';
  position: absolute;
  left: 60px;
  top: 22px;
  bottom: -2px;
  width: 1px;
  background: var(--border);
}
.tl-time {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  color: var(--text-muted);
  text-align: right;
  padding-top: 11px;
  line-height: 1.2;
  letter-spacing: 0.04em;
}
.tl-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 12px;
  margin-bottom: 6px;
  position: relative;
}
.tl-card::before {
  content: '';
  position: absolute;
  left: -6px; top: 12px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--navy);
  border: 2px solid var(--bg);
}
.tl-card.is-match::before { background: var(--red); }
.tl-card.is-flight::before { background: #2563eb; }
.tl-card-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
.tl-card-detail { font-size: 11px; color: var(--text-sec); margin-top: 2px; line-height: 1.4; }
.tl-tag {
  display: inline-block;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 4px;
  margin-top: 5px;
}
.tag-match { background: var(--red-light); color: var(--red); }
.tag-flight { background: rgba(37,99,235,0.1); color: #2563eb; }
.tag-food { background: rgba(245,158,11,0.1); color: #92400e; }
.tag-culture { background: rgba(1,33,105,0.08); color: var(--navy); }
.tag-transit { background: rgba(100,116,139,0.12); color: #475569; }

/* ── MAP ── */
.map-wrap {
  margin: 0 16px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid var(--border);
  height: 220px;
  position: relative;
}
.map-wrap iframe {
  width: 100%; height: 100%;
  border: none;
  display: block;
}
.map-overlay-label {
  position: absolute;
  top: 10px; left: 10px;
  background: var(--navy);
  color: var(--cream);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 20px;
  pointer-events: none;
  z-index: 10;
}

/* ── HOTEL CARD ── */
.hotel-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; }
.hotel-sub { font-size: 11px; color: var(--text-sec); margin-top: 2px; }
.meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.meta-item {}
.meta-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 3px; }
.meta-val { font-size: 13px; font-weight: 600; color: var(--text); font-family: var(--mono); }
.status-confirmed { color: var(--confirmed); font-weight: 700; font-size: 12px; display: flex; align-items: center; gap: 5px; }
.status-confirmed::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--confirmed); flex-shrink: 0; }
.status-option { color: var(--option); font-weight: 700; font-size: 12px; display: flex; align-items: center; gap: 5px; }
.status-option::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--option); flex-shrink: 0; }
.cancel-deadline { font-size: 10px; color: var(--red); font-weight: 600; margin-top: 6px; display: flex; align-items: center; gap: 4px; }

/* ── FLIGHT CARD ── */
.flight-route {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 10px;
}
.fl-iata {
  font-family: var(--display);
  font-size: 34px;
  letter-spacing: 1px;
  color: var(--navy);
  line-height: 1;
  flex: 1;
}
.fl-iata.right { text-align: right; }
.fl-middle {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 6px;
}
.fl-num {
  font-family: var(--mono);
  font-size: 9px; font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  white-space: nowrap;
}
.fl-line {
  width: 56px; height: 1px;
  background: linear-gradient(90deg, var(--border), var(--navy), var(--border));
  margin: 3px 0;
}
.fl-plane { font-size: 12px; }
.fl-city-name { font-size: 10px; color: var(--text-sec); margin-top: 2px; }
.fl-city-name.right { text-align: right; }
.conf-badge {
  display: inline-block;
  background: rgba(1,33,105,0.07);
  border: 1px solid rgba(1,33,105,0.15);
  color: var(--navy);
  font-family: var(--mono);
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.08em;
  padding: 2px 8px;
  border-radius: 5px;
}
.refund-badge {
  display: inline-block;
  background: rgba(21,128,61,0.08);
  border: 1px solid rgba(21,128,61,0.2);
  color: var(--confirmed);
  font-size: 10px; font-weight: 700;
  padding: 2px 8px;
  border-radius: 5px;
}

/* ── QUICK CARDS ── */
.quick-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 0 16px;
}
.qcard {
  background: var(--card);
  border-radius: 12px;
  padding: 14px 14px;
  border: 1px solid var(--border);
}
.qcard-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; }
.qcard-val {
  font-family: var(--display);
  font-size: 32px;
  color: var(--navy);
  letter-spacing: 0.5px;
  line-height: 1;
}
.qcard-sub { font-size: 11px; color: var(--text-sec); margin-top: 3px; }
.qcard.warn .qcard-val { color: var(--gold); }
.qcard.danger .qcard-val { color: var(--red); }

/* ── BUDGET ── */
.budget-total {
  font-family: var(--display);
  font-size: 48px;
  color: var(--navy);
  letter-spacing: 1px;
  line-height: 1;
}
.budget-sub { font-size: 12px; color: var(--text-sec); margin-top: 3px; }
.budget-cats { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px; display: flex; flex-direction: column; gap: 8px; }
.bcat { display: flex; justify-content: space-between; align-items: center; }
.bcat-name { font-size: 12px; color: var(--text-sec); display: flex; align-items: center; gap: 7px; }
.bcat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.bcat-val { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--text); }
.budget-total-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
}
.budget-total-label { font-size: 13px; font-weight: 700; color: var(--text); }
.budget-total-val { font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--navy); }

/* ── FLIGHTS LIST ── */
.flights-list { display: flex; flex-direction: column; gap: 0; }
.flight-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  margin: 0 16px 8px;
}
.fl-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 8px;
}
.fl-date { font-family: var(--mono); font-size: 10px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.06em; }
.fl-status-confirmed { background: rgba(21,128,61,0.1); color: var(--confirmed); font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.06em; text-transform: uppercase; }
.fl-status-tbc { background: rgba(245,158,11,0.1); color: var(--option); font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.06em; text-transform: uppercase; }
.fl-route-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.fl-airport { font-family: var(--display); font-size: 26px; letter-spacing: 0.5px; color: var(--navy); line-height: 1; }
.fl-arrow { font-size: 13px; color: var(--text-muted); flex: 1; text-align: center; }
.fl-details-row { display: flex; gap: 14px; flex-wrap: wrap; }
.fl-detail { display: flex; flex-direction: column; gap: 1px; }
.fl-detail-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
.fl-detail-val { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--text); }

/* ── HOTELS LIST ── */
.hotel-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  margin: 0 16px 8px;
}
.hi-city-badge {
  display: inline-block;
  background: var(--navy-light);
  color: var(--navy);
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 6px;
}
.hi-name { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 3px; }
.hi-dates { font-size: 11px; color: var(--text-sec); }
.hi-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; align-items: center; }

/* ── ITINERARY LIST ── */
.itin-day {
  margin: 0 16px 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.itin-header {
  background: var(--navy);
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.itin-date { font-family: var(--display); font-size: 18px; color: var(--cream); letter-spacing: 0.5px; }
.itin-city { font-size: 10px; font-weight: 700; color: rgba(253,233,200,0.6); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 1px; }
.itin-body { padding: 10px 14px; }
.itin-period { display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start; }
.itin-period-label {
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  min-width: 44px;
  padding-top: 1px;
  flex-shrink: 0;
}
.itin-period-val { font-size: 12px; color: var(--text); line-height: 1.4; }
.itin-match-row {
  margin-top: 8px;
  background: var(--red-light);
  border: 1px solid rgba(207,43,55,0.2);
  border-radius: 8px;
  padding: 7px 10px;
}
.itin-match-label { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--red); margin-bottom: 2px; }
.itin-match-val { font-size: 12px; font-weight: 600; color: var(--red); }

/* ── CITY HEADER ── */
.city-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.city-flag { font-size: 20px; }
.city-name-display { font-family: var(--display); font-size: 22px; color: var(--cream); letter-spacing: 0.5px; }
.city-dates-display { font-size: 10px; color: rgba(253,233,200,0.55); font-weight: 500; }

/* ── ERROR STATE ── */
.error-state {
  padding: 40px 20px;
  text-align: center;
}
.error-state h3 { font-size: 15px; color: var(--text); margin-bottom: 6px; }
.error-state p { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

/* ── SPACER ── */
.spacer-16 { height: 16px; }
.spacer-8 { height: 8px; }

/* ── ANIMATIONS ── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.25s ease forwards; }

/* ── RESPONSIVE ── */
@media (min-width: 500px) {
  .shell-max { max-width: 480px; margin: 0 auto; }
  .bottom-nav { max-width: 480px; left: 50%; transform: translateX(-50%); }
}
</style>

<script>
/* ══════════════════════════════════════
   CONFIG — update SHEETS_ID and MAPS_KEY
   ══════════════════════════════════════ */
const SHEETS_ID  = '1j_YJwB1ox3A43Bv8TBhohr4Mh3nLWFguJlPEUgEve-w';
const SHEETS_KEY = 'AIzaSyA32nyJoi_pf8E9PbY_TiVICjGEQlkY1sY'; // ← replace
const MAPS_KEY   = 'AIzaSyA32nyJoi_pf8E9PbY_TiVICjGEQlkY1sY';   // ← replace

/* ── RANGE NAMES (must match exact tab names in the sheet) ── */
const RANGE_ITIN1    = 'Itinerary!A:Z';
const RANGE_FLIGHTS1 = 'Flights!A:N';
const RANGE_HOTELS   = 'Hotels!A:R';
const RANGE_CANCEL   = 'Cancellation Tracker!A:S';

/* ═══════════════════════════════════
   STATE
   ═══════════════════════════════════ */
let currentRoute = 1;
let selectedDay  = null;
let data = {
  itin1: [], itin2: [],
  flights1: [], flights2: [],
  hotels1: [], hotels2: [],
  cancel: []
};
let loaded = false;

const TRIP_START  = new Date('2026-06-22');
const TRIP_END    = new Date('2026-07-22');
const MATCH_DATES = ['2026-06-23','2026-06-27','2026-07-01','2026-07-05','2026-07-11','2026-07-19'];

/* city → coordinates for maps */
const CITY_COORDS = {
  'BOSTON':      { lat: 42.3601, lng: -71.0589, label: 'Boston, MA' },
  'NEW YORK':    { lat: 40.7128, lng: -74.0060, label: 'New York, NY' },
  'NYC':         { lat: 40.7128, lng: -74.0060, label: 'New York, NY' },
  'ATLANTA':     { lat: 33.7490, lng: -84.3880, label: 'Atlanta, GA' },
  'MEXICO CITY': { lat: 19.4326, lng: -99.1332, label: 'Mexico City, MX' },
  'MEXICO':      { lat: 19.4326, lng: -99.1332, label: 'Mexico City, MX' },
  'MIAMI':       { lat: 25.7617, lng: -80.1918, label: 'Miami, FL' },
  'TORONTO':     { lat: 43.6510, lng: -79.3470, label: 'Toronto, CA' },
  'DALLAS':      { lat: 32.7767, lng: -96.7970, label: 'Dallas, TX' },
  'LONDON':      { lat: 51.5074, lng: -0.1278,  label: 'London, UK' },
};

/* ═══════════════════════════════════
   FETCH — Google Sheets v4
   ═══════════════════════════════════ */
async function fetchRange(range) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}/values/${encodeURIComponent(range)}?key=${SHEETS_KEY}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`Sheets API error ${r.status}`);
  const j = await r.json();
  return j.values || [];
}

function rowsToObjects(rows) {
  if (!rows || rows.length < 2) return [];
  const headers = rows[0].map(h => (h||'').trim());
  return rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (row[i] || '').trim(); });
    return obj;
  });
}

async function loadAllData() {
  try {
    const [itin, flights, hotels, cancel] = await Promise.all([
      fetchRange(RANGE_ITIN1),
      fetchRange(RANGE_FLIGHTS1),
      fetchRange(RANGE_HOTELS),
      fetchRange(RANGE_CANCEL),
    ]);

    /* Parse itinerary — detect Route 1 vs Route 2 by city column */
    const itinRows = rowsToObjects(itin);
    data.itin1 = itinRows.filter(r => r['City'] && !r['City'].includes('TOR') && !r['City'].includes('DAL') || isRoute1Day(r));
    data.itin2 = itinRows; // Route 2 uses a second itinerary block if available

    data.flights1 = rowsToObjects(flights);
    data.hotels1  = rowsToObjects(hotels);
    data.cancel   = rowsToObjects(cancel);

    loaded = true;
    renderAll();
  } catch(e) {
    console.error(e);
    showError(e.message);
  }
}

function isRoute1Day(row) {
  const city = (row['City'] || '').toUpperCase();
  return city !== 'TORONTO' && city !== 'TOR - DAL' && city !== 'DALLAS';
}

/* ═══════════════════════════════════
   HELPERS
   ═══════════════════════════════════ */
function today() {
  return new Date().toISOString().split('T')[0];
}

function fmtDate(d) {
  if (!d) return '';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const parsed = d instanceof Date ? d : new Date(d);
  if (isNaN(parsed)) return d;
  return `${parsed.getDate()} ${months[parsed.getMonth()]} ${parsed.getFullYear()}`;
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.ceil((d - now) / 86400000);
}

function dayOfTrip() {
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.ceil((now - TRIP_START) / 86400000) + 1;
  return Math.max(1, Math.min(21, diff));
}

function isMatchDay(dateStr) {
  return MATCH_DATES.includes(dateStr);
}

function getCityCoords(cityStr) {
  const upper = (cityStr||'').toUpperCase().trim();
  for (const key of Object.keys(CITY_COORDS)) {
    if (upper.includes(key)) return CITY_COORDS[key];
  }
  return CITY_COORDS['LONDON'];
}

function parseGBP(s) {
  if (!s) return 0;
  const n = parseFloat(s.replace(/[£$,]/g,''));
  return isNaN(n) ? 0 : n;
}

function mapsEmbedUrl(q) {
  return `https://www.google.com/maps/embed/v1/place?key=${MAPS_KEY}&q=${encodeURIComponent(q)}&zoom=12`;
}

function mapsSearchUrl(city) {
  const coords = getCityCoords(city);
  return `https://www.google.com/maps/embed/v1/search?key=${MAPS_KEY}&q=hotels+near+${encodeURIComponent(city)}&center=${coords.lat},${coords.lng}&zoom=13`;
}

function mapsViewUrl(lat, lng) {
  return `https://www.google.com/maps/embed/v1/view?key=${MAPS_KEY}&center=${lat},${lng}&zoom=13`;
}

/* Build a "place" map for multiple pins via search */
function mapForDay(row) {
  const city = (row['City'] || 'Boston').replace(/→/g,'').replace(/→/g,'').split('→')[0].trim();
  const coords = getCityCoords(city);
  if (MAPS_KEY === 'AIzaSyA32nyJoi_pf8E9PbY_TiVICjGEQlkY1sY') {
    return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#EEF2FF;gap:8px;">
      <div style="font-size:28px;">🗺️</div>
      <div style="font-size:11px;font-weight:600;color:#012169;letter-spacing:0.08em;text-transform:uppercase;">${city}</div>
      <div style="font-size:10px;color:#6b7280;">Add Maps API key to enable</div>
    </div>`;
  }
  return `<iframe src="${mapsViewUrl(coords.lat, coords.lng)}" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>`;
}

/* ═══════════════════════════════════
   TAB SWITCHING
   ═══════════════════════════════════ */
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('btn-'+tab).classList.add('active');
}

function setRoute(r) {
  currentRoute = r;
  document.querySelectorAll('.route-btn').forEach((b,i) => {
    b.classList.toggle('active', i+1 === r);
  });
  if (loaded) renderAll();
}

/* ═══════════════════════════════════
   RENDER: TODAY
   ═══════════════════════════════════ */
function renderToday() {
  const todayStr = today();
  const itinData = currentRoute === 1 ? data.itin1 : (data.itin2.length ? data.itin2 : data.itin1);
  const todayRow = itinData.find(r => r['Date'] === todayStr) || itinData[0];

  const city     = todayRow ? (todayRow['City'] || 'En Route') : 'En Route';
  const dayNum   = dayOfTrip();
  const isMatch  = isMatchDay(todayStr);

  /* Upcoming cancellation deadlines */
  const upcoming = data.cancel
    .filter(r => {
      const dl = daysUntil(r['Cancellation Deadline']?.split(' ')[0]);
      return dl !== null && dl >= 0 && dl <= 5 && (r['Status']||'').toLowerCase() !== 'confirmed';
    })
    .sort((a,b) => new Date(a['Cancellation Deadline']) - new Date(b['Cancellation Deadline']));

  /* Next flight */
  const flightsData = data.flights1;
  const nextFlight = flightsData.find(r => {
    const d = r['Date'] || r['Date '] || '';
    return d >= todayStr && (r['Status']||'').toLowerCase().includes('confirmed');
  });

  /* Tonight's hotel */
  const hotelsData = data.hotels1.filter(r => (r['Status']||'').toLowerCase() === 'confirmed');
  const tonightHotel = hotelsData.find(r => {
    const ci = r['Check In'] ? new Date(r['Check In']) : null;
    const co = r['Check Out'] ? new Date(r['Check Out']) : null;
    const t  = new Date(todayStr);
    return ci && co && ci <= t && co > t;
  });

  /* Build day scroller dates */
  const tripDays = [];
  for (let d = new Date(TRIP_START); d <= new Date('2026-07-22'); d.setDate(d.getDate()+1)) {
    tripDays.push(new Date(d));
  }

  const dayAbbrs = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  /* Match info for today if exists */
  let matchRow = null;
  if (todayRow) {
    const kickoff = todayRow['Kick-off'] || todayRow['Kick Off'] || '';
    const match   = todayRow['Match'] || '';
    if (kickoff && match && match.toLowerCase() !== 'rest day') {
      matchRow = { kickoff, match, venue: todayRow['Venue / Stage'] || '' };
    }
  }

  /* Build timeline for today */
  const periods = ['AM','PM','Evening'];
  const periodValues = [
    todayRow ? (todayRow['AM'] || '') : '',
    todayRow ? (todayRow['PM'] || '') : '',
    todayRow ? (todayRow['Evening'] || '') : '',
  ];
  const periodTimes = ['Morning', 'Afternoon', 'Evening'];

  let tlHTML = '';
  periods.forEach((p, i) => {
    const val = periodValues[i];
    if (!val || val === '—' || val === '-') return;
    const isFlight = val.toLowerCase().includes('flight') || val.toLowerCase().includes('→') || val.includes('→');
    const isFood   = val.toLowerCase().includes('dinner') || val.toLowerCase().includes('lunch') || val.toLowerCase().includes('breakfast') || val.toLowerCase().includes('restaurant') || val.toLowerCase().includes('bar') || val.toLowerCase().includes('pub');
    const isMatchEv = val.toLowerCase().includes('match') || val.toLowerCase().includes('kick off') || val.toLowerCase().includes('stadium');
    const tag = isFlight ? '<span class="tl-tag tag-flight">Transit</span>'
              : isMatchEv ? '<span class="tl-tag tag-match">Match</span>'
              : isFood ? '<span class="tl-tag tag-food">Food & Drink</span>'
              : '<span class="tl-tag tag-culture">Activity</span>';
    const cls = isMatchEv ? 'tl-card is-match' : isFlight ? 'tl-card is-flight' : 'tl-card';
    tlHTML += `
      <div class="tl-row">
        <div class="tl-time">${periodTimes[i]}</div>
        <div class="${cls}">
          <div class="tl-card-title">${val.split('|')[0].trim()}</div>
          ${tag}
        </div>
      </div>`;
  });

  /* Alerts HTML */
  let alertsHTML = '';
  upcoming.slice(0, 2).forEach(r => {
    const dl = daysUntil(r['Cancellation Deadline']?.split(' ')[0]);
    const urgency = dl === 0 ? '🚨 TODAY' : dl === 1 ? '⚠️ Tomorrow' : `⚠️ ${dl} days`;
    alertsHTML += `
      <div class="alert">
        <div class="alert-icon">⏰</div>
        <div class="alert-body">
          <div class="alert-title">${urgency} — Cancellation deadline</div>
          <div class="alert-text">${r['Item'] || r['Hotel Name'] || 'Booking'} · ${r['City'] || ''}</div>
        </div>
      </div>`;
  });

  /* Hotel HTML */
  let hotelHTML = '';
  if (tonightHotel) {
    const h = tonightHotel;
    const cancelDays = daysUntil((h['Refund Deadline'] || h['Cancellation Deadline'] || '').split(' ')[0]);
    hotelHTML = `
      <div class="section-label">Tonight's Hotel</div>
      <div class="card card-pad">
        <div class="hotel-name">${h['Hotel Name'] || h['Item'] || 'Hotel'}</div>
        <div class="hotel-sub">${h['City'] || ''} · ${h['Booked With'] || h['Provider'] || ''} ${h['Booking #'] || h['Booking/Conf #'] || ''}</div>
        <div class="meta-grid">
          <div class="meta-item">
            <div class="meta-label">Check-in</div>
            <div class="meta-val">${h['Check In'] || '—'}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Check-out</div>
            <div class="meta-val">${h['Check Out'] || '—'}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Status</div>
            <div class="${(h['Status']||'').toLowerCase()==='confirmed'?'status-confirmed':'status-option'}">${h['Status'] || '—'}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Cost</div>
            <div class="meta-val">${h['Total (£)'] || h['Per Person (£)'] || '—'}</div>
          </div>
        </div>
        ${cancelDays !== null && cancelDays >= 0 ? `<div class="cancel-deadline">⚠️ Cancel deadline: ${h['Refund Deadline'] || h['Cancellation Deadline']} (${cancelDays}d)</div>` : ''}
      </div>`;
  }

  /* Next flight HTML */
  let flightHTML = '';
  if (nextFlight) {
    const f = nextFlight;
    const isToday = (f['Date']||'') === todayStr;
    flightHTML = `
      <div class="section-label">✈️ ${isToday ? 'Today\'s Flight' : 'Next Flight'}</div>
      <div class="card card-pad">
        <div class="flight-route">
          <div>
            <div class="fl-iata">${(f['From']||'').split(' ').pop().replace(/[()]/g,'') || f['From']||'—'}</div>
            <div class="fl-city-name">${f['From']||''}</div>
          </div>
          <div class="fl-middle">
            <div class="fl-num">${f['Flight No.']||''}</div>
            <div class="fl-line"></div>
            <div class="fl-plane">✈</div>
          </div>
          <div style="text-align:right">
            <div class="fl-iata right">${(f['To']||'').split(' ').pop().replace(/[()]/g,'') || f['To']||'—'}</div>
            <div class="fl-city-name right">${f['To']||''}</div>
          </div>
        </div>
        <div class="meta-grid">
          <div class="meta-item">
            <div class="meta-label">Date</div>
            <div class="meta-val">${f['Date']||f['Date ']||'—'}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Times</div>
            <div class="meta-val">${f['Times']||'—'}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Airline</div>
            <div class="meta-val">${f['Airline']||'—'}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Ref</div>
            <div class="meta-val">${f['Conf #']||f['Conf #']||'—'}</div>
          </div>
        </div>
      </div>`;
  }

  document.getElementById('today-content').innerHTML = `
    <div class="fade-in">

      <!-- HERO -->
      <div class="today-hero">
        <div class="hero-eyebrow">▶ ${todayRow ? 'Today' : 'Trip Overview'}</div>
        <div class="hero-city">${city.split('→')[0].trim()}</div>
        <div class="hero-date">${fmtDate(todayStr)} · Day ${dayNum} of 21</div>
        <div class="hero-pills">
          ${isMatch ? '<div class="hero-pill match-pill">⚽ Match Day</div>' : ''}
          ${nextFlight && (nextFlight['Date']||'')===todayStr ? '<div class="hero-pill">✈️ Flight Day</div>' : ''}
          ${tonightHotel ? '<div class="hero-pill">🏨 ' + (tonightHotel['Hotel Name']||'Hotel').split(' ').slice(0,3).join(' ') + '</div>' : ''}
        </div>
      </div>

      <!-- DAY SCROLLER -->
      <div class="day-scroll-wrap">
        <div class="day-scroll" id="dayScroll">
          ${tripDays.map(d => {
            const ds = d.toISOString().split('T')[0];
            const isToday2 = ds === todayStr;
            const hasMatch = isMatchDay(ds);
            return `<div class="day-chip${isToday2?' selected':''}${hasMatch?' match-day':''}" onclick="selectDay('${ds}')">
              <div class="chip-day">${dayAbbrs[d.getDay()]}</div>
              <div class="chip-date">${d.getDate()}</div>
              <div class="chip-dot"></div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- MATCH BANNER -->
      ${matchRow ? `
      <div class="match-banner" style="margin:12px 16px 0;">
        <div class="match-label">⚽ England Match · ${matchRow.kickoff}</div>
        <div class="match-title">${matchRow.match}</div>
        <div class="match-chips">
          <div class="match-chip">🏟 ${matchRow.venue.split('—')[0].trim()}</div>
          <div class="match-chip">${matchRow.kickoff}</div>
        </div>
      </div>` : ''}

      <!-- ALERTS -->
      ${alertsHTML}

      <!-- TODAY'S TIMELINE -->
      ${tlHTML ? `<div class="section-label">Today's Plan</div><div class="timeline">${tlHTML}</div>` : ''}

      <!-- MAP -->
      <div class="section-label">Map</div>
      <div class="map-wrap">
        <div class="map-overlay-label">${city.split('→')[0].trim()}</div>
        ${mapForDay(todayRow || {City: 'Boston'})}
      </div>

      <!-- HOTEL -->
      ${hotelHTML}

      <!-- FLIGHT -->
      ${flightHTML}

      <!-- QUICK STATS -->
      <div class="section-label">At a Glance</div>
      <div class="quick-grid">
        <div class="qcard">
          <div class="qcard-label">Day</div>
          <div class="qcard-val">${dayNum}</div>
          <div class="qcard-sub">of 21 total</div>
        </div>
        <div class="qcard">
          <div class="qcard-label">Days left</div>

      </div>`;
  });

  html += '</div>';
  document.getElementById('flights-content').innerHTML = html;
}

function extractIATA(str) {
  if (!str) return '???';
  /* Try to find 3-letter airport code in parens or at start */
  const inParens = str.match(/\(([A-Z]{3})\)/);
  if (inParens) return inParens[1];
  const words = str.split(/\s+/);
  for (const w of words.reverse()) {
    if (/^[A-Z]{3}$/.test(w)) return w;
  }
  return str.substring(0, 3).toUpperCase();
}

  const activities = data.cancel.filter(r => (r['Category']||'').toLowerCase() === 'activity');

  const ticketTotal = 4295;

function renderSelectedDay(dateStr) {
  const itinData = currentRoute === 1 ? data.itin1 : data.itin2;
  const row = itinData.find(r => r['Date'] === dateStr);
  if (!row) return;

  const city = row['City'] || '';
  const d = new Date(dateStr);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  /* Update hero */
  const heroCity = document.querySelector('.hero-city');
  if (heroCity) heroCity.textContent = city.split('→')[0].trim();

  const heroEyebrow = document.querySelector('.hero-eyebrow');
  if (heroEyebrow) heroEyebrow.textContent = `▶ ${d.getDate()} ${months[d.getMonth()]}`;

  /* Update timeline */
  const am  = row['AM'] || '';
  const pm  = row['PM'] || '';
  const eve = row['Evening'] || '';
  let tlHTML = '';
  [[am,'Morning'],[pm,'Afternoon'],[eve,'Evening']].forEach(([val,t]) => {
    if (!val || val==='—') return;
    const isF = val.toLowerCase().includes('flight')||val.includes('→');
    const isM = val.toLowerCase().includes('match')||val.toLowerCase().includes('stadium');
    const isFood = val.toLowerCase().includes('dinner')||val.toLowerCase().includes('lunch')||val.toLowerCase().includes('bar');
    const tag = isM ? '<span class="tl-tag tag-match">Match</span>' : isF ? '<span class="tl-tag tag-flight">Transit</span>' : isFood ? '<span class="tl-tag tag-food">Food</span>' : '<span class="tl-tag tag-culture">Activity</span>';
    tlHTML += `<div class="tl-row"><div class="tl-time">${t}</div><div class="tl-card${isM?' is-match':isF?' is-flight':''}"><div class="tl-card-title">${val}</div>${tag}</div></div>`;
  });

  const tl = document.querySelector('.timeline');
  if (tl) tl.innerHTML = tlHTML;

  /* Update map */
  const mapWrap = document.querySelector('.map-wrap');
  if (mapWrap) mapWrap.innerHTML = `<div class="map-overlay-label">${city.split('→')[0].trim()}</div>${mapForDay(row)}`;
}
