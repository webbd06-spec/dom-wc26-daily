<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dom's WC26 Trip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script>
// Google Maps JS API loaded dynamically
function initMap() { window._mapsReady = true; if (window._mapsReadyCb) window._mapsReadyCb(); }
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA32nyJoi_pf8E9PbY_TiVICjGEQlkY1sY&callback=initMap"></script>
<style>
:root {
  --navy:      #012169;
  --navy-mid:  #02308a;
  --navy-dim:  rgba(1,33,105,0.07);
  --cream:     #FDE9C8;
  --cream-bg:  #FFF8EE;
  --red:       #CF2B37;
  --red-dim:   rgba(207,43,55,0.1);
  --gold:      #D97706;
  --gold-dim:  rgba(217,119,6,0.12);
  --green:     #15803d;
  --green-dim: rgba(21,128,61,0.1);
  --bg:        #F0F4FF;
  --card:      #FFFFFF;
  --border:    rgba(1,33,105,0.1);
  --text:      #012169;
  --text-2:    rgba(1,33,105,0.6);
  --text-3:    rgba(1,33,105,0.38);
  --mono:      'JetBrains Mono', monospace;
  --display:   'Bebas Neue', sans-serif;
  --body:      'Inter', sans-serif;
  --safe-b:    env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--body);background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
.top-nav{position:sticky;top:0;z-index:200;background:var(--navy);height:52px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 16px rgba(1,33,105,0.3)}
.nav-left{display:flex;align-items:center;gap:10px}
.nav-title{font-family:var(--display);font-size:22px;color:var(--cream);letter-spacing:.5px;line-height:1}
.nav-sub{font-size:10px;color:rgba(253,233,200,.5);font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
.route-toggle{display:flex;background:rgba(255,255,255,.1);border-radius:8px;padding:2px;gap:2px}
.rbtn{font-family:var(--body);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 10px;border:none;border-radius:6px;cursor:pointer;transition:all .18s}
.rbtn.active{background:var(--cream);color:var(--navy)}
.rbtn:not(.active){background:transparent;color:rgba(253,233,200,.45)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--navy);display:flex;padding-bottom:var(--safe-b);border-top:1px solid rgba(255,255,255,.08)}
.bnav{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0;background:none;border:none;cursor:pointer;transition:all .15s;position:relative}
.bnav.active{color:var(--cream)}
.bnav:not(.active){color:rgba(253,233,200,.35)}
.bnav.active::after{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--cream);border-radius:0 0 2px 2px}
.bnav-icon{font-size:19px;line-height:1}
.bnav-label{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.page{display:none;padding-bottom:calc(68px + var(--safe-b))}
.page.active{display:block}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:12px;font-weight:500;color:var(--text-3)}
.sec{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);padding:18px 16px 8px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
.card{background:var(--card);border-radius:14px;margin:0 16px 10px;border:1px solid var(--border)}
.cp{padding:14px 16px}
.hero{background:var(--navy);padding:18px 16px 16px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:rgba(253,233,200,.03);border:1px solid rgba(253,233,200,.06)}
.hero-eye{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(253,233,200,.45);margin-bottom:3px}
.hero-city{font-family:var(--display);font-size:54px;letter-spacing:1px;line-height:1;color:var(--cream);position:relative;z-index:1}
.hero-date{font-size:12px;font-weight:500;color:rgba(253,233,200,.5);margin-top:3px}
.hero-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;position:relative;z-index:1}
.hpill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid rgba(253,233,200,.18);background:rgba(253,233,200,.07);color:var(--cream)}
.hpill.match{background:var(--red);border-color:transparent}
.weather-strip{background:var(--navy);border-top:1px solid rgba(255,255,255,.06);padding:10px 16px 14px;display:flex;gap:10px;overflow-x:auto;scrollbar-width:none}
.weather-strip::-webkit-scrollbar{display:none}
.wx-day{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 10px;border-radius:10px;border:1px solid rgba(255,255,255,.08);min-width:52px;cursor:pointer;transition:all .15s}
.wx-day.today{background:rgba(253,233,200,.12);border-color:rgba(253,233,200,.25)}
.wx-day.match-day{border-color:rgba(207,43,55,.5)}
.wx-label{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(253,233,200,.4)}
.wx-date{font-family:var(--display);font-size:20px;letter-spacing:.5px;line-height:1;color:var(--cream)}
.wx-icon{font-size:16px;line-height:1}
.wx-temp{font-family:var(--mono);font-size:10px;font-weight:700;color:rgba(253,233,200,.7)}
.wx-rain{font-size:9px;color:rgba(253,233,200,.4)}
.wx-dot{width:4px;height:4px;border-radius:50%;background:var(--red);opacity:0}
.wx-day.match-day .wx-dot{opacity:1}
.match-banner{background:var(--red);border-radius:14px;margin:12px 16px 0;padding:14px 16px;position:relative;overflow:hidden}
.match-banner::before{content:'⚽';position:absolute;right:-8px;top:-10px;font-size:80px;opacity:.1;transform:rotate(12deg)}
.mb-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:3px}
.mb-title{font-family:var(--display);font-size:28px;color:#fff;letter-spacing:.5px;line-height:1.1}
.mb-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.mb-chip{background:rgba(0,0,0,.2);border-radius:6px;padding:4px 8px;font-size:11px;font-weight:600;color:rgba(255,255,255,.9)}
.matches-list{padding:0 16px;display:flex;flex-direction:column;gap:6px}
.match-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px}
.match-row.my-match{background:var(--red-dim);border-color:rgba(207,43,55,.25)}
.match-time{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--text-3);min-width:52px;flex-shrink:0}
.match-teams{flex:1}
.match-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.3}
.match-venue-small{font-size:10px;color:var(--text-3);margin-top:1px}
.match-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0}
.badge-you{background:var(--red);color:#fff}
.badge-city{background:var(--navy-dim);color:var(--navy)}
.alert{margin:10px 16px 0;background:var(--gold-dim);border:1px solid rgba(217,119,6,.25);border-radius:12px;padding:10px 12px;display:flex;align-items:flex-start;gap:10px}
.alert-icon{font-size:15px;flex-shrink:0;line-height:1.5}
.alert-title{font-size:12px;font-weight:700;color:#92400e}
.alert-text{font-size:11px;color:#78350f;margin-top:1px;line-height:1.4}
.tl{padding:0 16px}
.tl-row{display:grid;grid-template-columns:52px 1fr;gap:0 10px;position:relative}
.tl-row:not(:last-child)::after{content:'';position:absolute;left:60px;top:22px;bottom:-2px;width:1px;background:var(--border)}
.tl-time{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--text-3);text-align:right;padding-top:11px;letter-spacing:.04em}
.tl-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:6px;position:relative}
.tl-card::before{content:'';position:absolute;left:-6px;top:12px;width:10px;height:10px;border-radius:50%;background:var(--navy);border:2px solid var(--bg)}
.tl-card.is-match::before{background:var(--red)}
.tl-card.is-flight::before{background:#2563eb}
.tl-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.tl-detail{font-size:11px;color:var(--text-2);margin-top:2px;line-height:1.4}
.tl-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:2px 7px;border-radius:4px;margin-top:5px}
.tag-match{background:var(--red-dim);color:var(--red)}
.tag-flight{background:rgba(37,99,235,.1);color:#2563eb}
.tag-food{background:rgba(217,119,6,.1);color:#92400e}
.tag-activity{background:var(--navy-dim);color:var(--navy)}
.tag-transit{background:rgba(100,116,139,.1);color:#475569}
.map-wrap{margin:0 16px;border-radius:14px;overflow:hidden;border:1px solid var(--border);height:240px;position:relative}
.map-wrap iframe{width:100%;height:100%;border:none;display:block}
.hotel-name{font-size:15px;font-weight:700;color:var(--text);line-height:1.3}
.hotel-sub{font-size:11px;color:var(--text-2);margin-top:2px}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.meta-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:3px}
.meta-val{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text)}
.s-confirmed{color:var(--green);font-weight:700;font-size:12px;display:flex;align-items:center;gap:5px}
.s-confirmed::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.s-option{color:var(--gold);font-weight:700;font-size:12px;display:flex;align-items:center;gap:5px}
.s-option::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0}
.cancel-line{font-size:10px;color:var(--red);font-weight:600;margin-top:6px;display:flex;align-items:center;gap:4px}
.fl-route{display:flex;align-items:center;margin-bottom:10px}
.fl-iata{font-family:var(--display);font-size:34px;letter-spacing:1px;color:var(--navy);line-height:1;flex:1}
.fl-iata.r{text-align:right}
.fl-mid{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;padding:0 8px}
.fl-num{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--text-3);letter-spacing:.08em;white-space:nowrap}
.fl-line{width:56px;height:1px;background:linear-gradient(90deg,var(--border),var(--navy),var(--border));margin:3px 0}
.fl-city{font-size:10px;color:var(--text-2);margin-top:1px}
.fl-city.r{text-align:right}
.conf-badge{display:inline-block;background:var(--navy-dim);border:1px solid rgba(1,33,105,.15);color:var(--navy);font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;padding:2px 8px;border-radius:5px}
.q-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px}
.qcard{background:var(--card);border-radius:12px;padding:14px;border:1px solid var(--border)}
.q-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:5px}
.q-val{font-family:var(--display);font-size:32px;color:var(--navy);letter-spacing:.5px;line-height:1}
.q-sub{font-size:11px;color:var(--text-2);margin-top:3px}
.qcard.warn .q-val{color:var(--gold)}
.b-total{font-family:var(--display);font-size:44px;color:var(--navy);letter-spacing:1px;line-height:1}
.b-sub{font-size:12px;color:var(--text-2);margin-top:3px}
.b-cats{margin-top:14px;border-top:1px solid var(--border);padding-top:12px;display:flex;flex-direction:column;gap:8px}
.b-row{display:flex;justify-content:space-between;align-items:center}
.b-name{font-size:12px;color:var(--text-2);display:flex;align-items:center;gap:7px}
.b-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.b-val{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text)}
.b-total-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.b-total-label{font-size:13px;font-weight:700;color:var(--text)}
.b-total-val{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--navy)}
.itin-day{margin:0 16px 10px;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.itin-past{opacity:.55}
.itin-hdr{background:var(--navy);padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.itin-date{font-family:var(--display);font-size:18px;color:var(--cream);letter-spacing:.5px}
.itin-city-lbl{font-size:10px;font-weight:700;color:rgba(253,233,200,.55);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
.itin-body{padding:10px 14px}
.itin-period{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start}
.itin-p-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);min-width:44px;padding-top:1px;flex-shrink:0}
.itin-p-val{font-size:12px;color:var(--text);line-height:1.4}
.itin-matches{margin-top:8px;border-top:1px solid var(--border);padding-top:8px;display:flex;flex-direction:column;gap:4px}
.itin-match-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:7px;background:var(--bg)}
.itin-match-row.mine{background:var(--red-dim);border:1px solid rgba(207,43,55,.2)}
.itin-m-time{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--text-3);min-width:48px;flex-shrink:0}
.itin-m-teams{font-size:11px;font-weight:600;color:var(--text);flex:1;line-height:1.3}
.itin-m-venue{font-size:9px;color:var(--text-3)}
.itin-m-badge{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;background:var(--red);color:#fff;flex-shrink:0}
.city-hdr{background:linear-gradient(135deg,var(--navy),var(--navy-mid));padding:10px 16px;display:flex;align-items:center;gap:10px}
.city-hdr-name{font-family:var(--display);font-size:22px;color:var(--cream);letter-spacing:.5px}
.city-hdr-sub{font-size:10px;color:rgba(253,233,200,.5);font-weight:500}
.fl-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin:0 16px 8px}
.fl-item.past{opacity:.5}
.fl-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.fl-date-lbl{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--text-3);letter-spacing:.06em}
.badge-confirmed{background:rgba(21,128,61,.1);color:var(--green);font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.06em;text-transform:uppercase}
.badge-tbc{background:var(--gold-dim);color:var(--gold);font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.06em;text-transform:uppercase}
.fl-route-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.fl-airport{font-family:var(--display);font-size:26px;letter-spacing:.5px;color:var(--navy);line-height:1}
.fl-arrow{font-size:12px;color:var(--text-3);flex:1;text-align:center}
.fl-details{display:flex;gap:14px;flex-wrap:wrap;margin-top:6px;border-top:1px solid var(--border);padding-top:8px}
.fl-d-item{display:flex;flex-direction:column;gap:1px}
.fl-d-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3)}
.fl-d-val{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--text)}
.refund-tag{display:inline-block;background:var(--green-dim);border:1px solid rgba(21,128,61,.2);color:var(--green);font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;margin-top:6px}
.hotel-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin:0 16px 8px}
.hi-city{display:inline-block;background:var(--navy-dim);color:var(--navy);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:4px;margin-bottom:6px}
.hi-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:3px}
.hi-dates{font-size:11px;color:var(--text-2)}
.hi-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;align-items:center}
.hi-note{font-size:10px;color:var(--text-3);margin-top:5px}
.rest-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin:0 16px 6px;display:flex;align-items:flex-start;gap:10px}
.rest-icon{font-size:18px;line-height:1.3;flex-shrink:0}
.rest-name{font-size:13px;font-weight:600;color:var(--text)}
.rest-cuisine{font-size:10px;color:var(--text-3);margin-top:1px}
.rest-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.rest-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px}
.rt-booked{background:rgba(21,128,61,.1);color:var(--green)}
.rt-idea{background:var(--navy-dim);color:var(--navy)}
.rt-todo{background:var(--gold-dim);color:var(--gold)}
.sp16{height:16px}
.day-scroll-wrap{background:var(--navy);border-top:1px solid rgba(255,255,255,.06)}
.day-scroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:10px 16px 14px}
.day-scroll::-webkit-scrollbar{display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .25s ease forwards}
@media(min-width:500px){.shell{max-width:480px;margin:0 auto}.bottom-nav{max-width:480px;left:50%;transform:translateX(-50%)}}
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-left">
    <span style="font-size:22px">🏴󠁧󠁢󠁥󠁮󠁧󠁿</span>
    <div>
      <div class="nav-title">DOM × WC26</div>
      <div class="nav-sub" id="navSub">Loading…</div>
    </div>
  </div>
  <div class="route-toggle">
    <button class="rbtn active" onclick="setRoute(1)">1st</button>
    <button class="rbtn" onclick="setRoute(2)">2nd</button>
  </div>
</nav>
<div class="shell">
  <div class="page active" id="page-today"><div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading your trip…</div></div></div>
  <div class="page" id="page-itin"><div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading itinerary…</div></div></div>
  <div class="page" id="page-flights"><div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading flights…</div></div></div>
  <div class="page" id="page-hotels"><div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading hotels…</div></div></div>
  <div class="page" id="page-budget"><div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading budget…</div></div></div>
  <div class="page" id="page-map">
    <div id="map-day-scroll-wrap" class="day-scroll-wrap">
      <div class="day-scroll" id="map-day-scroll" style="padding:10px 16px 14px"></div>
    </div>
    <div id="map-day-label" style="padding:10px 16px 4px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3)"></div>
    <div id="map-main" style="margin:0 16px;border-radius:14px;overflow:hidden;border:1px solid var(--border);height:calc(100dvh - 220px);position:relative"></div>
    <div id="map-pin-legend" style="padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap"></div>
  </div>

/* ═══════════════════════════
   MATCH TIME LOCALISATION
═══════════════════════════ */
/**
 * Convert a schedule time string like "17:00 ET" or "21:00 CT"
 * to the local time at cityKey. Returns "17:00" (no tz suffix).
 * If no tz suffix or unknown tz — returns the raw HH:MM part unchanged.
 */
function convertMatchTime(timeStr, cityKey) {
  if (!timeStr) return '';
  const m = timeStr.trim().match(/^(\d{1,2}):(\d{2})\s*([A-Z]+)$/);
  if (!m) {
    // No tz suffix — return HH:MM portion only
    const t = timeStr.trim().match(/^(\d{1,2}):(\d{2})/);
    return t ? `${t[1].padStart(2,'0')}:${t[2]}` : timeStr;
  }
  const [, hStr, minStr, tz] = m;
  const srcOffset = TZ_OFFSETS[tz];
  if (srcOffset === undefined) {
    // Unknown tz — return HH:MM as-is
    return `${hStr.padStart(2,'0')}:${minStr}`;
  }
  const cityInfo = CITIES[cityKey] || CITIES['LONDON'];
  const dstOffset = cityInfo.utcOffset;
  const srcMinutes = parseInt(hStr) * 60 + parseInt(minStr);
  const deltaMin   = (dstOffset - srcOffset) * 60;
  let localMin     = ((srcMinutes + deltaMin) % 1440 + 1440) % 1440;
  const lh = Math.floor(localMin / 60);
  const lm = localMin % 60;
  return `${String(lh).padStart(2,'0')}:${String(lm).padStart(2,'0')}`;
}

/** Return minutes-since-midnight for sorting. Handles "17:00", "17:00 ET", etc. Returns 9999 for unparseable. */
function timeToMinutes(timeStr) {
  if (!timeStr) return 9999;
  const m = timeStr.trim().match(/^(\d{1,2}):(\d{2})/);
  if (!m) return 9999;
  return parseInt(m[1]) * 60 + parseInt(m[2]);
}

/** Convert raw schedule time to local time for a city, and return {display, sortKey}. */
function localiseMatch(rawTime, cityKey) {
  const display = convertMatchTime(rawTime, cityKey);
  return { display, sortKey: timeToMinutes(display) };
}

function parseDate(s) {
  if (!s) return null;
  if (/^\d{4}-\d{2}-\d{2}$/.test(s.trim())) {
    const [y,m,d] = s.trim().split('-').map(Number);
    return new Date(y, m-1, d);
  }
  const d = new Date(s.replace(/^(Mon|Tue|Wed|Thu|Fri|Sat|Sun),?\s*/i,''));
  return isNaN(d) ? null : d;
}
function toISODate(s) { const d=parseDate(s); if(!d) return ''; return d.toISOString().split('T')[0]; }
function fmtDate(s) { if(!s) return ''; const d=parseDate(s); if(!d) return s; return `${d.getDate()} ${MONTHS[d.getMonth()]}`; }
function daysUntil(s) {
  if (!s) return null;
  const clean = s.replace(/\bat\b.*/i,'').replace(/\bon\b/i,'').trim();
  const d = new Date(clean); if (isNaN(d)) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.ceil((d - now) / 86400000);
}
function getCity(str) {
  const u = (str||'').toUpperCase().split('→')[0].split('-')[0].trim();
  for (const k of Object.keys(CITIES)) { if (u.includes(k)) return k; }

}
function extractIATA(str) {
  if (!str) return '???';
  const m = str.match(/\(([A-Z]{3})\)/); if (m) return m[1];
  const words = str.split(/\s+/);
  for (const w of [...words].reverse()) { if (/^[A-Z]{3}$/.test(w)) return w; }
  return str.substring(0,3).toUpperCase();
}
function parseGBP(s) { if (!s) return 0; const n=parseFloat(String(s).replace(/[£$,\s]/g,'')); return isNaN(n)?0:n; }
function isEngland(match) { return /england/i.test(match||''); }
function matchInCity(venue, city) {

}

  const r = await fetch(url);

let _sheetMeta = null;
async function getSheetMeta() {
  if (_sheetMeta) return _sheetMeta;
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?key=${SHEET_KEY}&fields=sheets.properties`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`Sheets metadata ${r.status}`);
  const j = await r.json();
  _sheetMeta = j.sheets.map(s => ({ title: s.properties.title, index: s.properties.index }));

}
async function fetchSheetByKeyword(keyword, range) {
  const meta = await getSheetMeta();
  let sheet = meta.find(s => s.title.includes(keyword));
  if (!sheet) sheet = meta.find(s => s.title.replace(/[^\w\s()]/g,'').trim().includes(keyword));
  if (!sheet) throw new Error(`No tab found matching: ${keyword}`);
  return fetchSheet(`'${sheet.title}'!${range}`);
}
function toObjs(rows, headerKeywords) {
  if (!rows || rows.length < 2) return [];
  const keywords = headerKeywords || ['Date','City','Status','Hotel Name','From','To','Item','Activity','Flight No.','Check In','AM','PM','Evening'];
  let headerIdx = 0;
  for (let i = 0; i < Math.min(rows.length, 10); i++) {
    const row = rows[i] || [];
    const cells = row.map(c => (c||'').trim());
    const allShort = cells.filter(c => c).every(c => c.length < 50);
    const hasKeyword = cells.some(c => keywords.includes(c));
    if (allShort && hasKeyword) { headerIdx = i; break; }
  }
  const hdrs = rows[headerIdx].map(h => (h||'').trim());
  return rows.slice(headerIdx + 1)
    .filter(row => row && row.some(cell => (cell||'').trim()))
    .map(row => { const o={}; hdrs.forEach((h,i)=>{ if(h) o[h]=(row[i]||'').trim(); }); return o; });
}

async function fetchWeather(cityKey, days=16) {

  const url = `https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lng}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&timezone=${encodeURIComponent(c.tz)}&forecast_days=${days}`;
  try {
    const r = await fetch(url);
    const j = await r.json();
    const result = {};
    (j.daily?.time||[]).forEach((date,i) => {
      result[date] = { max:Math.round(j.daily.temperature_2m_max[i]), min:Math.round(j.daily.temperature_2m_min[i]), rain:j.daily.precipitation_probability_max[i], code:j.daily.weathercode[i] };
    });
    weatherCache[cityKey] = result;
    return result;
  } catch(e) { return {}; }
}

      marker.addListener('click', () => info.open(map, marker));
    });
    if (locs.length > 1) setTimeout(() => map.fitBounds(bounds, {padding:50}), 100);
  };
  if (window._mapsReady && window.google) doRender();

}

/* ═══ GROUP ITINERARY BY DATE ═══ */
function groupItinByDate(rows) {
  const days = [], byDate = {};
  rows.forEach(r => {
    const date = r['Date'] && /^\d{4}-\d{2}-\d{2}$/.test(r['Date']) ? r['Date'] : null;
    if (!date) return;
    if (!byDate[date]) { const day={date, city:r['City']||'', activities:[], matches:[]}; byDate[date]=day; days.push(day); }
    const day = byDate[date];
    if (!day.city && r['City']) day.city = r['City'];
    if (!r['Activity']) return;
    const isMatch  = (r['Type']||'') === 'Match';
    const isMatchO = (r['Type']||'') === 'Match-Other';
    if (isMatch || isMatchO) {
      day.matches.push({ kickoff:r['Time']||'', match:r['Activity']||'', venue:r['Location Name']||'', type:r['Type'], mine:isMatch });
    } else {
      day.activities.push({ time:r['Time']||'', activity:r['Activity']||'', location:r['Location Name']||'', type:r['Type']||'Activity' });
    }
  });
  days.sort((a,b) => a.date.localeCompare(b.date));
  return days;
}
function getRouteDays() {
  const rows = currentRoute===1 ? (appData.itin1||appData.itinRows) : (appData.itin2||appData.itinRows);
  return groupItinByDate(rows);
}

  document.getElementById('navSub').textContent = `Route ${currentRoute} · ${city}`;
}

/* ═══ MAP PINS ═══ */
const PIN_COLORS = { 'Stadium':'#CF2B37','Hotel':'#012169','Airport':'#2563eb','Restaurant':'#D97706','Activity':'#15803d','Transit':'#6b7280' };
const PIN_ICONS  = { 'Stadium':'🏟','Hotel':'🏨','Airport':'✈️','Restaurant':'🍽','Activity':'🎯','Transit':'🚂' };

function renderDayMap(containerId, dateStr, cityInfo) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const routeStr = String(currentRoute);
  const locs = dateStr
    ? (appData.locations||[]).filter(l => { const r=l['Route']||'Both'; return l['Date']===dateStr&&(r==='Both'||r===routeStr); })
    : (appData.locations||[]).filter(l => { const r=l['Route']||'Both'; const c=(l['City']||'').toUpperCase(); const target=(cityInfo.label||'').toUpperCase(); const cityMatch=target.split(',')[0].split(' ').some(w=>w.length>3&&c.includes(w)); return cityMatch&&(r==='Both'||r===routeStr); });
  if (!locs.length) {
    container.innerHTML = `<iframe src="https://www.google.com/maps/embed/v1/view?key=${MAPS_KEY}&center=${cityInfo.lat},${cityInfo.lng}&zoom=13" style="width:100%;height:100%;border:none" allowfullscreen loading="lazy"></iframe>`;
    return;
  }
  const doRender = () => {
    if (!window.google || !window.google.maps) return;
    const avgLat=locs.reduce((s,l)=>s+parseFloat(l['Lat']||0),0)/locs.length;
    const avgLng=locs.reduce((s,l)=>s+parseFloat(l['Lng']||0),0)/locs.length;
    const map = new google.maps.Map(container, { center:{lat:avgLat,lng:avgLng}, zoom:locs.length===1?15:13, mapTypeControl:false, streetViewControl:false, fullscreenControl:false, styles:[{featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]},{featureType:'transit',elementType:'labels',stylers:[{visibility:'simplified'}]}] });
    const bounds = new google.maps.LatLngBounds();
    locs.forEach(l => {
      const lat=parseFloat(l['Lat']), lng=parseFloat(l['Lng']);
      if(isNaN(lat)||isNaN(lng)) return;
      const pos={lat,lng}; bounds.extend(pos);
      const type=l['Type']||'Activity', color=PIN_COLORS[type]||'#012169', icon=PIN_ICONS[type]||'📍';
      const marker = new google.maps.Marker({ position:pos, map, title:l['Name'], icon:{ path:google.maps.SymbolPath.CIRCLE, scale:10, fillColor:color, fillOpacity:1, strokeColor:'#fff', strokeWeight:2 }, label:{text:icon,fontSize:'14px'} });
      const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&destination_place_name=${encodeURIComponent(l['Name']||'')}`;
      const info = new google.maps.InfoWindow({ content:`<div style="font-family:Inter,sans-serif;min-width:160px;padding:4px 2px"><div style="font-weight:700;color:#012169;font-size:13px;margin-bottom:2px">${icon} ${l['Name']}</div><div style="font-size:11px;color:#666">${type}${l['Notes']?'<br><span style="color:#444">'+l['Notes']+'</span>':''}</div><a href="${mapsUrl}" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:5px;margin-top:8px;padding:7px 10px;background:#012169;color:#FDE9C8;font-size:11px;font-weight:700;text-decoration:none;border-radius:6px;letter-spacing:.03em">🗺 Open in Google Maps</a></div>` });
      marker.addListener('click', () => info.open(map, marker));
    });
    if (locs.length > 1) map.fitBounds(bounds, {padding:40});
  };
  if (window._mapsReady && window.google) doRender();
  else window._mapsReadyCb = doRender;
}

async function renderToday() {
  const el = document.getElementById('page-today');
  const days = getRouteDays();
  const todayStr = today();
  const todayDay = days.find(d => d.date === todayStr)
    || (todayStr < '2026-06-22' ? days[0] : days[days.length-1]);
  const isPreTrip  = todayStr < '2026-06-22';
  const isPostTrip = todayStr > '2026-07-22';
  const city    = todayDay ? todayDay.city.split('→')[0].trim() : 'En Route';
  const cityKey = getCity(city);
  const cityInfo = CITIES[cityKey] || CITIES['LONDON'];

  const tripStart = parseDate('2026-06-22');
  const now = new Date(); now.setHours(0,0,0,0);
  const dayNum = Math.max(1, Math.ceil((now - tripStart) / 86400000) + 1);

  const [wx, wcMatches] = await Promise.all([fetchWeather(cityKey), fetchWCMatches()]);
  const todayWx = wx[todayStr] || null;
  const nextWCMatch  = getNextWCMatch(wcMatches);
  const nextEngMatch = getNextEnglandMatch(wcMatches);

  const confirmedHotels = appData.hotels.filter(h => (h['Status']||'').toLowerCase()==='confirmed');
  const tonightHotel = confirmedHotels.find(h => {
    const ci=toISODate(h['Check In']), co=toISODate(h['Check Out']);
    return ci&&co&&todayStr>=ci&&todayStr<co;
  }) || (isPreTrip ? confirmedHotels.find(h => h['City']==='Boston') : null);

  const flights = currentRoute===1 ? appData.flights1 : appData.flights2;
  const nextFlight = flights.find(f => { const d=toISODate(f['Date']||f['Date ']||''); return d&&d>=todayStr; }) || flights[0];

  // My matches — localise times
  const myMatches = todayDay
    ? (todayDay.matches||[])
        .filter(m => m.mine || isEngland(m.match))
        .map(m => { const loc=localiseMatch(m.kickoff, cityKey); return {...m, localTime:loc.display, sortKey:loc.sortKey}; })
        .sort((a,b) => a.sortKey - b.sortKey)
    : [];

  // All matches today — localise and sort chronologically
  const allMatches = todayDay
    ? (todayDay.matches||[])
        .map(m => { const loc=localiseMatch(m.kickoff, cityKey); return {...m, localTime:loc.display, sortKey:loc.sortKey}; })
        .sort((a,b) => a.sortKey - b.sortKey)
    : [];

  const nextEnglandMatch = (() => {
    for (const d of days) {
      if (d.date < todayStr) continue;
      const em = (d.matches||[]).find(m => isEngland(m.match));
      if (em) return {...em, date:d.date, city:d.city};
    }
    return null;
  })();
  const primaryMatch = myMatches[0] || null;

  const alerts = appData.cancel.filter(r => {
    const dl=daysUntil(r['Cancellation Deadline']);
    return dl!==null&&dl>=0&&dl<=5&&!(r['Status']||'').toLowerCase().includes('cancelled');
  }).sort((a,b) => daysUntil(a['Cancellation Deadline'])-daysUntil(b['Cancellation Deadline']));

  const tripDays = days.slice(0, 12);
  const pills = [];
  if (primaryMatch) pills.push(`<div class="hpill match">⚽ Match Day</div>`);
  if (nextFlight&&(nextFlight['Date']||nextFlight['Date ']||'')===todayStr) pills.push(`<div class="hpill">✈️ Flight Day</div>`);
  if (tonightHotel) pills.push(`<div class="hpill">🏨 ${(tonightHotel['Hotel Name']||'Hotel').split(' ').slice(0,3).join(' ')}</div>`);
  if (todayWx) pills.push(`<div class="hpill">${WX_ICONS[todayWx.code]||'🌡'} ${todayWx.max}°C · ${todayWx.rain}% rain</div>`);

  // Timeline
  let tlHTML = '';
  if (todayDay && todayDay.activities) {
    todayDay.activities.filter(a => a.activity).forEach(a => {
      const t=(a.type||'').toLowerCase();
      const cls=t==='match'?'tl-card is-match':(t==='airport'||t==='transit')?'tl-card is-flight':'tl-card';
      const tag=t==='match'?'<span class="tl-tag tag-match">Match</span>':(t==='airport'||t==='transit')?'<span class="tl-tag tag-flight">Transit</span>':t==='restaurant'?'<span class="tl-tag tag-food">Food & Drink</span>':'<span class="tl-tag tag-activity">Activity</span>';
      // Localise time for match activities (which are stored in ET/CT etc.); leave other activity times as-is
      const displayTime = t==='match' ? (convertMatchTime(a.time, cityKey)||a.time||'—') : (a.time||'—');
      tlHTML += `<div class="tl-row"><div class="tl-time">${displayTime}</div><div class="${cls}"><div class="tl-title">${a.activity}</div>${a.location?`<div class="tl-detail">${a.location}</div>`:''} ${tag}</div></div>`;
    });
  }

  // All matches HTML — local time, sorted
  let matchListHTML = '';
  if (allMatches.length) {
    const tzLbl = cityInfo.tzLabel || 'local';
    matchListHTML = `<div class="sec">All Matches Today <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:9px;color:var(--text-3)">· times in ${tzLbl}</span></div><div class="matches-list">`;
    allMatches.forEach(m => {

      </div>`;
    });
    matchListHTML += `</div>`;
  }

  let alertsHTML = '';
  alerts.slice(0,2).forEach(r => {
    const dl=daysUntil(r['Cancellation Deadline']);
    const urg=dl===0?'🚨 TODAY':dl===1?'⚠️ Tomorrow':`⚠️ ${dl} days`;
    alertsHTML += `<div class="alert"><div class="alert-icon">⏰</div><div><div class="alert-title">${urg} — Cancellation deadline</div><div class="alert-text">${r['Item']||'Booking'} · ${r['City']||''} · Cancel by ${r['Cancellation Deadline']}</div></div></div>`;
  });

  let hotelHTML = '';
  if (tonightHotel) {
    const h=tonightHotel;
    const dl=daysUntil((h['Refund Deadline']||'').split(' ').slice(0,3).join(' '));
    hotelHTML = `<div class="sec">Tonight's Hotel</div><div class="card cp">
      <div class="hotel-name">${h['Hotel Name']||'—'}</div>

      <div class="meta-grid">
        <div><div class="meta-label">Check-in</div><div class="meta-val">${fmtDate(h['Check In'])}</div></div>
        <div><div class="meta-label">Check-out</div><div class="meta-val">${fmtDate(h['Check Out'])}</div></div>
        <div><div class="meta-label">Status</div><div class="s-confirmed">Confirmed</div></div>
        <div><div class="meta-label">Cost</div><div class="meta-val">${h['Total (£)']||'—'}</div></div>
      </div>
      ${dl!==null&&dl>=0?`<div class="cancel-line">⚠️ Cancel by: ${h['Refund Deadline']} (${dl}d)</div>`:''}
    </div>`;
  }

  let flightHTML = '';
  if (nextFlight) {
    const f=nextFlight;
    const isToday2=(f['Date']||f['Date ']||'')===todayStr;
    flightHTML = `<div class="sec">✈️ ${isToday2?"Today's Flight":"Next Flight"}</div><div class="card cp">
      <div class="fl-route">
        <div><div class="fl-iata">${extractIATA(f['From'])}</div><div class="fl-city">${f['From']||''}</div></div>
        <div class="fl-mid"><div class="fl-num">${f['Flight No.']||''}</div><div class="fl-line"></div><div style="font-size:12px">✈</div></div>
        <div style="text-align:right"><div class="fl-iata r">${extractIATA(f['To'])}</div><div class="fl-city r">${f['To']||''}</div></div>
      </div>
      <div class="meta-grid">
        <div><div class="meta-label">Date</div><div class="meta-val">${fmtDate(f['Date']||f['Date '])}</div></div>
        <div><div class="meta-label">Times</div><div class="meta-val">${f['Times']||'—'}</div></div>
        <div><div class="meta-label">Airline</div><div class="meta-val">${f['Airline']||'—'}</div></div>
        <div><div class="meta-label">Ref</div><div class="conf-badge">${f['Conf #']||'—'}</div></div>
      </div>
    </div>`;
  }

  const mapDivId = 'day-map-' + (todayDay?.date || 'pre');
  const mapHTML = `<div class="sec">Map · ${city.split('→')[0].trim()}</div><div class="map-wrap" id="${mapDivId}" style="height:260px"></div>`;

  el.innerHTML = `<div class="fade">
    <div class="hero">
      <div class="hero-eye">${isPreTrip?'🛫 DEPARTING IN '+Math.ceil((parseDate('2026-06-22')-new Date())/86400000)+' DAYS':isPostTrip?'🏠 BACK HOME':'▶ TODAY · '+fmtDate(todayStr)}</div>
      <div class="hero-city">${city.split('→')[0].trim()}</div>
      <div class="hero-date">Day ${dayNum} of 21 · ${cityInfo.label}</div>

    <div class="day-scroll-wrap"><div class="day-scroll" style="padding:10px 16px 14px">
      ${tripDays.map(d => {
        const dDate=parseDate(d.date), dWx=wx[d.date];
        const hasMatch=d.matches&&d.matches.some(m=>isEngland(m.match)||matchInCity(m.venue,d.city));
        return `<div class="wx-day${d.date===todayStr?' today':''}${hasMatch?' match-day':''}" onclick="jumpToDay('${d.date}')">

async function renderItinerary() {
  const el = document.getElementById('page-itin');
  const days = getRouteDays();
  const todayStr = today();
  const cityKeys = [...new Set(days.map(d => getCity((d.city||'').split('→')[0].trim())))];
  await Promise.all(cityKeys.map(k => fetchWeather(k)));

  let lastCity = '', html = '<div class="fade">';
  days.forEach(d => {
    const city=(d.city||'').split('→')[0].trim();
    if (city !== lastCity && city) {
      const ci=CITIES[getCity(city)]||{};
      html += `<div class="city-hdr"><div style="font-size:20px">${ci.flag||'🌍'}</div><div><div class="city-hdr-name">${city}</div><div class="city-hdr-sub">${ci.label||city}</div></div></div>`;
      lastCity = city;
    }
    const dDate=parseDate(d.date), isPast=d.date<todayStr, isToday=d.date===todayStr;
    const ck=getCity(city), dWx=(weatherCache[ck]||{})[d.date];
    const cityInfo=CITIES[ck]||{};
    const myMatches=d.matches.filter(m=>m.mine||isEngland(m.match));
    const hasContent=d.activities.length||d.matches.length;
    const actCount=d.activities.length+d.matches.length;
    const startOpen=!isPast||isToday;

    // Localise all match times for this city and sort
    const sortedMatches=[...d.matches]
      .map(m => { const loc=localiseMatch(m.kickoff, ck); return {...m, localTime:loc.display, sortKey:loc.sortKey}; })
      .sort((a,b) => a.sortKey - b.sortKey);

    const tzLbl = cityInfo.tzLabel || '';

    html += `<div class="itin-day${isPast?' itin-past':''}" id="day-${d.date}" style="${isToday?'border-color:var(--navy);border-width:2px':''}">
      <div class="itin-hdr itin-toggle" onclick="toggleDay('${d.date}')" style="cursor:pointer">
        <div>
          <div class="itin-date">${DAYS[dDate.getDay()]} ${dDate.getDate()} ${MONTHS[dDate.getMonth()]}</div>
          <div class="itin-city-lbl">${city}${dWx?` · ${WX_ICONS[dWx.code]||''} ${dWx.max}°C`:''}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          ${isToday?'<span style="background:var(--cream);color:var(--navy);font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.06em">TODAY</span>':''}
          ${myMatches.length?'<span style="font-size:18px">⚽</span>':''}
          ${!isToday&&!myMatches.length&&actCount?`<span style="font-size:10px;color:rgba(253,233,200,.45);font-weight:600">${actCount} item${actCount>1?'s':''}</span>`:''}
          <span class="itin-chevron" id="chev-${d.date}" style="color:rgba(253,233,200,.5);font-size:14px;transition:transform .2s;${startOpen?'transform:rotate(180deg)':''}">▼</span>
        </div>
      </div>
      <div class="itin-body" id="body-${d.date}" style="${startOpen?'':'display:none'}">
        ${hasContent ? `
          ${d.activities.length ? d.activities.map(a => {
            const t=(a.type||'').toLowerCase();
            const tagCls=t==='airport'||t==='transit'?'tag-flight':t==='restaurant'?'tag-food':'tag-activity';
            const tagLabel=t==='airport'||t==='transit'?'Transit':t==='restaurant'?'Food & Drink':t==='hotel'?'Hotel':'Activity';
            const actDisplayTime = t==='match' ? (convertMatchTime(a.time, ck)||a.time||'—') : (a.time||'—');
            return `<div class="itin-period"><div class="itin-p-label">${actDisplayTime}</div><div class="itin-p-val">${a.activity}${a.location?`<span style="color:var(--text-3);font-size:10px"> · ${a.location}</span>`:''}<span class="tl-tag ${tagCls}" style="margin-left:4px">${tagLabel}</span></div></div>`;
          }).join('') : ''}
          ${sortedMatches.length ? `<div class="itin-matches">
            <div style="font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:4px">Matches${tzLbl?' · '+tzLbl:''}</div>
            ${sortedMatches.map(m=>`<div class="itin-match-row${m.mine?' mine':''}">
              <div class="itin-m-time">${m.localTime}</div>
              <div class="itin-m-teams"><div style="font-size:11px;font-weight:600">${m.match}</div><div class="itin-m-venue">${m.venue}</div></div>
              ${m.mine?`<div class="itin-m-badge">${isEngland(m.match)?'🏴󠁧󠁢󠁥󠁮󠁧󠁿':'📍'}</div>`:''}
            </div>`).join('')}
          </div>` : ''}
          <div id="itin-map-${d.date}" style="margin:10px 0 4px;border-radius:10px;overflow:hidden;border:1px solid var(--border);height:180px"></div>
        ` : '<div style="padding:10px 0;font-size:11px;color:var(--text-3)">No activities logged yet</div>'}
      </div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;

  if (selectedDate) {
    setTimeout(() => { const t=document.getElementById('day-'+selectedDate); if(t) t.scrollIntoView({behavior:'smooth',block:'start'}); }, 50);
  }
  setTimeout(() => {
    days.forEach(d => {
      const isPast=d.date<todayStr, isToday=d.date===todayStr;
      if (!isPast||isToday) {
        const ck=getCity((d.city||'').split('→')[0].trim());
        const ci=CITIES[ck]||CITIES['LONDON'];
        renderDayMap('itin-map-'+d.date, d.date, ci);
      }
    });
  }, 300);
}

function toggleDay(dateStr) {
  const body=document.getElementById('body-'+dateStr), chev=document.getElementById('chev-'+dateStr);
  if (!body) return;
  const isOpen=body.style.display!=='none';
  body.style.display=isOpen?'none':'';
  if (chev) chev.style.transform=isOpen?'':'rotate(180deg)';
  if (!isOpen) {
    const days=getRouteDays(), d=days.find(x=>x.date===dateStr);
    if (d) { const ck=getCity((d.city||'').split('→')[0].trim()); const ci=CITIES[ck]||CITIES['LONDON']; setTimeout(()=>renderDayMap('itin-map-'+dateStr,dateStr,ci),100); }
  }
}

/* ═══════════════════════════
   RENDER: FLIGHTS
═══════════════════════════ */
function renderFlights() {
  const el=document.getElementById('page-flights');
  const todayStr=today();
  const flights=currentRoute===1?appData.flights1:appData.flights2;
  let html='<div class="fade"><div class="sec">All Flights · Route '+currentRoute+'</div>';
  flights.filter(f=>f['From']||f['Flight No.']).forEach(f=>{
    const rawDate=f['Date']||f['Date ']||f['']||'';
    const date=toISODate(rawDate)||rawDate;
    const isPast=date&&date<todayStr;
    const isConf=(f['Status']||'').toLowerCase().includes('confirmed');
    const isTBC=(f['Status']||'').toLowerCase()==='tbc';
    html+=`<div class="fl-item${isPast?' past':''}">
      <div class="fl-hdr"><div class="fl-date-lbl">${rawDate||'TBC'} · ${f['Airline']||''}</div><span class="${isConf?'badge-confirmed':'badge-tbc'}">${f['Status']||'TBC'}</span></div>
      <div class="fl-route-row"><div class="fl-airport">${extractIATA(f['From'])}</div><div class="fl-arrow">→ ${f['Flight No.']||''} →</div><div class="fl-airport">${extractIATA(f['To'])}</div></div>
      <div style="font-size:11px;color:var(--text-2);margin-bottom:4px">${f['From']||''} → ${f['To']||''}</div>
      <div class="fl-details">
        <div class="fl-d-item"><div class="fl-d-label">Times</div><div class="fl-d-val">${f['Times']||'—'}</div></div>
        <div class="fl-d-item"><div class="fl-d-label">Cost</div><div class="fl-d-val">${f['Total (£)']||'—'}</div></div>
        <div class="fl-d-item"><div class="fl-d-label">Ref</div><div class="fl-d-val">${f['Conf #']||'—'}</div></div>
      </div>
      ${(f['Refundable']||'').toLowerCase().includes('yes')?'<span class="refund-tag">✓ Refundable</span>':''}
      ${f['Notes']?`<div style="font-size:10px;color:var(--text-3);margin-top:6px">${f['Notes']}</div>`:''}
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}

/* ═══════════════════════════
   RENDER: HOTELS
═══════════════════════════ */
function renderHotels() {
  const el=document.getElementById('page-hotels');
  const todayStr=today();
  const show=appData.hotels.filter(h=>{
    const s=(h['Status']||'').toLowerCase();
    const routeOk=h._route===currentRoute||h['City']==='New York';
    return (s==='confirmed'||s==='option')&&routeOk;
  });
  const byCity={};
  show.forEach(h=>{const c=h['City']||'Other';if(!byCity[c])byCity[c]=[];byCity[c].push(h);});
  const cityOrder=['Boston','NYC','Atlanta','Mexico City','Miami','Toronto','Dallas','New York'];
  const orderedCities=cityOrder.filter(c=>byCity[c]).concat(Object.keys(byCity).filter(c=>!cityOrder.includes(c)));
  let html='<div class="fade">';
  orderedCities.forEach(city=>{
    const ck=getCity(city), ci=CITIES[ck]||{};
    html+=`<div class="sec">${ci.flag||'🏙'} ${city}</div>`;
    const hotelMapId='hotel-map-'+city.replace(/\s+/g,'-');
    html+=`<div class="map-wrap" id="${hotelMapId}" style="margin:0 16px 10px;height:180px"></div>`;
    byCity[city].forEach(h=>{
      const isConf=(h['Status']||'').toLowerCase()==='confirmed';
      const dl=daysUntil((h['Refund Deadline']||'').split(' ').slice(0,3).join(' '));
      html+=`<div class="hotel-item">
        <div class="hi-city">${city}</div>
        <div class="hi-name">${h['Hotel Name']||'—'}</div>
        <div class="hi-dates">${h['Check In']||''} → ${h['Check Out']||''} · ${h['Nights']||'?'} nights</div>
        <div class="hi-meta">
          <div class="${isConf?'s-confirmed':'s-option'}">${h['Status']||'—'}</div>
          ${h['Total (£)']?`<span class="conf-badge">${h['Total (£)']}</span>`:''}
          ${h['Booking #']?`<span class="conf-badge">#${h['Booking #']}</span>`:''}
        </div>
        ${h['Refund Deadline']?`<div class="cancel-line">⚠️ Cancel by: ${h['Refund Deadline']}${dl!==null?` (${dl}d)`:''}</div>`:''}
        ${h['Notes']?`<div class="hi-note">${h['Notes']}</div>`:''}
      </div>`;
    });
  });
  html+='</div>';
  el.innerHTML=html;
  setTimeout(()=>{
    orderedCities.forEach(city=>{
      const ci=CITIES[getCity(city)]||{};
      const mapId='hotel-map-'+city.replace(/\s+/g,'-');
      if(document.getElementById(mapId)) renderDayMap(mapId,null,ci);
    });
  },200);
}

/* ═══════════════════════════
   RENDER: BUDGET
═══════════════════════════ */
function renderBudget() {
  const el=document.getElementById('page-budget');
  const confirmedHotels=appData.hotels.filter(h=>(h['Status']||'').toLowerCase()==='confirmed');
  const hotelTotal=confirmedHotels.reduce((s,h)=>s+parseGBP(h['Total (£)']),0);
  const flights=currentRoute===1?appData.flights1:appData.flights2;
  const flightTotal=flights.reduce((s,f)=>s+parseGBP(f['Total (£)']),0);
  const actTotal=appData.cancel.filter(r=>(r['Category']||'').toLowerCase()==='activity'&&(r['Status']||'').toLowerCase()==='confirmed').reduce((s,r)=>s+parseGBP(r['Cost at risk (£)']),0);
  const ticketTotal=4295;
  const grand=hotelTotal+flightTotal+actTotal+ticketTotal;
  const atRisk=appData.cancel.filter(r=>(r['Status']||'').toLowerCase()==='option').reduce((s,r)=>s+parseGBP(r['Cost at risk (£)']),0);
  const byCityHotel={};
  confirmedHotels.forEach(h=>{const c=h['City']||'Other';byCityHotel[c]=(byCityHotel[c]||0)+parseGBP(h['Total (£)']);});
  const restByCityHTML={};
  appData.restaurants.filter(r=>r['Name']&&r['City']).forEach(r=>{
    const c=r['City']||'Other';
    if(!restByCityHTML[c]) restByCityHTML[c]=[];
    const s=(r['Status']||r['Reservation?']||'').toLowerCase();
    const tagCls=s.includes('book')?'rt-booked':s.includes('todo')?'rt-todo':'rt-idea';
    const tagLabel=s.includes('book')?'Booked':s.includes('todo')?'To Book':'Idea';
    restByCityHTML[c].push(`<div class="rest-item"><div class="rest-icon">🍽</div><div><div class="rest-name">${r['Name']}</div><div class="rest-cuisine">${r['Cuisine']||''}</div><div class="rest-meta"><span class="rest-tag ${tagCls}">${tagLabel}</span>${r['Date/Time']?`<span class="rest-tag rt-idea">${r['Date/Time']}</span>`:''}</div></div></div>`);
  });
  let html=`<div class="fade">
  <div class="sec">Total Committed Spend</div>
  <div class="card cp">
    <div class="b-total">£${Math.round(grand).toLocaleString()}</div>
    <div class="b-sub">confirmed bookings across all categories</div>
    <div class="b-cats">
      <div class="b-row"><div class="b-name"><div class="b-dot" style="background:#2563eb"></div>Flights</div><div class="b-val">£${Math.round(flightTotal).toLocaleString()}</div></div>
      <div class="b-row"><div class="b-name"><div class="b-dot" style="background:var(--navy)"></div>Hotels (confirmed)</div><div class="b-val">£${Math.round(hotelTotal).toLocaleString()}</div></div>
      <div class="b-row"><div class="b-name"><div class="b-dot" style="background:var(--red)"></div>Tickets</div><div class="b-val">£${ticketTotal.toLocaleString()}</div></div>
      <div class="b-row"><div class="b-name"><div class="b-dot" style="background:var(--gold)"></div>Activities</div><div class="b-val">£${Math.round(actTotal).toLocaleString()}</div></div>
      <div class="b-total-row"><div class="b-total-label">Grand total</div><div class="b-total-val">£${Math.round(grand).toLocaleString()}</div></div>
    </div>
  </div>
  <div class="sec">Options at Risk</div>
  <div class="card cp">
    <div style="font-family:var(--display);font-size:36px;color:var(--gold)">£${Math.round(atRisk).toLocaleString()}</div>
    <div style="font-size:11px;color:var(--text-2);margin-top:3px">Held as options — depends on England's group stage result. Most have free cancellation.</div>
  </div>
  <div class="sec">Hotels by City</div>
  <div class="card cp">
    ${Object.entries(byCityHotel).map(([c,v])=>`<div class="b-row" style="margin-bottom:8px"><div class="b-name"><div class="b-dot" style="background:var(--navy)"></div>${c}</div><div class="b-val">£${Math.round(v).toLocaleString()}</div></div>`).join('')}
  </div>
  <div class="sec">Restaurants</div>
  ${Object.entries(restByCityHTML).map(([c,items])=>`<div style="font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);padding:12px 16px 6px">${c}</div>${items.join('')}`).join('')}
  <div class="sp16"></div>
  </div>`;
  el.innerHTML=html;
}

/* ═══ ERROR ═══ */
function showGlobalError(msg) {
  ['today','itin','flights','hotels','budget'].forEach(p => {
    const el=document.getElementById('page-'+p);
    if(el) el.innerHTML=`<div style="padding:40px 20px;text-align:center"><div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px">Couldn't load data</div><div style="font-size:12px;color:var(--text-3);line-height:1.5">${msg}<br><br>Check the Sheets API key and ensure the spreadsheet is publicly readable.</div></div>`;
  });
}

/* ═══ INIT ═══ */
loadAll();
</script>
